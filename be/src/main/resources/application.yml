# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /hallo

# 数据库配置 - H2 内存数据库
spring:
  datasource:
    url: jdbc:h2:mem:chatdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false
    time-zone: Asia/Shanghai
  websocket:
    max-text-message-size: 8192
    max-binary-message-size: 8192

# 日志配置
logging:
  level:
    org.springframework: INFO
    com.chat.app: DEBUG
