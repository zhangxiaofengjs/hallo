# 服务器配置
server:
  port: 8000
  servlet:
    context-path: /hallo

# 数据库配置 - H2 内存数据库
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hallo?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    # 设置时区为上海
    time-zone: Asia/Shanghai

# Mybatis 配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml

# 日志配置
logging:
  level:
    # Spring 框架日志级别
    "[org.springframework]": DEBUG
    # 应用日志级别
    "[com.hallo]": DEBUG
