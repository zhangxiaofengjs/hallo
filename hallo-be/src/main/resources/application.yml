# 服务器配置
server:
  port: 8000
  servlet:
    context-path: /hallo

# 数据库配置 - H2 内存数据库
spring:
  jackson:
    serialization:
      # 禁用空 Bean 序列化失败
      FAIL_ON_EMPTY_BEANS: false
    # 设置时区为上海
    time-zone: Asia/Shanghai
  websocket:
    # 设置 WebSocket 消息大小限制（单位：字节）
    max-text-message-size: 8192
    max-binary-message-size: 8192

# 日志配置
logging:
  level:
    # Spring 框架日志级别
    org.springframework: INFO
    # 应用日志级别
    com.chat.app: DEBUG
